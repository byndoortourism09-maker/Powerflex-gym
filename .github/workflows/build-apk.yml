name: Build PowerFlex APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platforms
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2 and generate wrapper
        run: |
          # Install Gradle 8.2 directly
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          export GRADLE_HOME=/tmp/gradle-install/gradle-8.2
          export PATH=$GRADLE_HOME/bin:$PATH
          # Generate proper wrapper files
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PowerFlex-Gym-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          
